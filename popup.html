<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    h3 {
      margin: 0 0 10px 0;
      color: #333;
    }
    .tab-item {
      padding: 8px;
      margin: 5px 0;
      background: #f5f5f5;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tab-item:hover {
      background: #e0e0e0;
    }
    .tab-favicon {
      width: 16px;
      height: 16px;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tab-actions {
      display: flex;
      gap: 5px;
    }
    button {
      padding: 4px 8px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    .switch-btn {
      background: #4CAF50;
      color: white;
    }
    .mute-btn {
      background: #f44336;
      color: white;
    }
    .unmute-btn {
      background: #2196F3;
      color: white;
    }
    .no-tabs {
      text-align: center;
      color: #666;
      padding: 20px;
    }
    .refresh-btn {
      width: 100%;
      padding: 8px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    .refresh-btn:hover {
      background: #1976D2;
    }
  </style>
</head>
<body>
  <h3>🔊 Where's the Noise</h3>
  <div id="content"></div>
  <button class="refresh-btn" id="refresh">Refresh</button>
  <script src="popup.js"></script>
</body>
</html>
